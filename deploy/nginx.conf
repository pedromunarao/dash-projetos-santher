# =============================================================
#  Nginx – Configuração de Reverse Proxy
#  Priority Manager | Santher TI
#
#  Coloque este arquivo em:
#    /etc/nginx/sites-available/priority-manager
#  Depois ative com:
#    sudo ln -s /etc/nginx/sites-available/priority-manager \
#               /etc/nginx/sites-enabled/priority-manager
#    sudo nginx -t && sudo systemctl reload nginx
# =============================================================

server {
    listen 80;
    server_name _;          # substitua pelo IP ou domínio da VM (ex: 192.168.1.50)

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/priority-manager.access.log;
    error_log  /var/log/nginx/priority-manager.error.log;

    # ── Compressão gzip ───────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Timeout para uploads / requests longos ────────────────
    client_max_body_size 10M;
    proxy_read_timeout   120s;

    # ── Proxy para o Node.js (porta 3000) ─────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";   # suporte a WebSocket

        # Cache de proxy desabilitado (app dinâmica)
        proxy_no_cache     1;
        proxy_cache_bypass 1;
    }

    # ── Assets estáticos com cache de browser ─────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }
}
